name: Python Tests

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install -e .

      - name: Run Ruff (lint)
        run: ruff check .

      - name: Run tests with coverage
        run: PYTHONPATH=src pytest --cov=app --cov-report=term-missing

      - name: Build package
        run: python -m build
